{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Add Membership</h2>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    
    <form method="POST" id="memForm">
        <div class="form-group">
            <label>Membership Number (Unique)</label>
            <input type="text" name="membership_number" required>
        </div>
        
        <div class="form-group">
            <label>Member Name</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Duration Option</label>
            <div class="radio-group" style="flex-direction: column; align-items: flex-start; gap: 0.5rem; margin-top:0.5rem;">
                <label class="radio-label"><input type="radio" name="duration" value="6 months" checked> 6 Months</label>
                <label class="radio-label"><input type="radio" name="duration" value="1 year"> 1 Year</label>
                <label class="radio-label"><input type="radio" name="duration" value="2 years"> 2 Years</label>
            </div>
        </div>
        
        <button type="submit" class="btn">Add Member</button>
    </form>
</div>
{% endblock %}
